name = "vmail"
main = "worker/src/index.ts"

# 打包配置
minify = true
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2025-03-01"
keep_vars = true

# 启用 D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "${D1_DATABASE_NAME}"
database_id = "${D1_DATABASE_ID}"
migrations_dir = "worker/drizzle"

# 定义环境变量和密钥
[vars]
EMAIL_DOMAIN = "${EMAIL_DOMAIN}"
TURNSTILE_KEY = "${TURNSTILE_KEY}"
COOKIES_SECRET = "${COOKIES_SECRET}"
TURNSTILE_SECRET = "${TURNSTILE_SECRET}"
PASSWORD = "${PASSWORD}"
API_RATE_LIMIT_PER_MINUTE = "${API_RATE_LIMIT_PER_MINUTE}"
SHOW_AFF = "${SHOW_AFF}"
ENABLE_OPENAPI = "${ENABLE_OPENAPI}"

# 配置邮件处理
[triggers]
crons = ["0 * * * *"]

# Email Worker 绑定：启用后 Cloudflare 会将路由到的邮件转发给 Worker 的 email handler
[email]
binding = "EMAIL"

# 构建配置
[build]
command = "pnpm run build"

# 静态资源配置
[assets]
binding = "ASSETS"
directory = "frontend/build/client"
